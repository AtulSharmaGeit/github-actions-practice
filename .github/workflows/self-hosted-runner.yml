name: Self-Hosted Runner Demo

on: [push]

jobs:
  demo:
    runs-on: self-hosted
    steps:
      - name: Print Hostname
        run: hostname

      - name: Print Working Directory
        run: pwd

      - name: Create a File
        run: echo "Hello from my self-hosted runner!" > runner-test.txt

      - name: Verify File Exists
        run: ls -l runner-test.txt
